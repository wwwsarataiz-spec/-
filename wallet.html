<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Premium Wallet & Deposit</title>
    <style>
        :root {
            --bg-main: #0c0914;
            --bg-card: #151124;
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --yellow-accent: #ffdf00;
            --text-main: #f1ebd9;
            --text-muted: #a39bb4;
            --input-bg: #1d1833;
            --border-color: rgba(212, 175, 55, 0.25);
            --warning-orange: #ff9900;
            --success-green: #00cc66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 15px;
            min-height: 100vh;
        }

        .wallet-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .wallet-header h1 {
            color: var(--gold-primary);
            font-size: 24px;
        }

        .deposit-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--gold-light);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group select, .form-group input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-group select:focus, .form-group input:focus {
            border-color: var(--yellow-accent);
        }

        .address-box {
            background: #120e20;
            border: 1px dashed var(--gold-primary);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

        .address-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            color: var(--yellow-accent);
            word-break: break-all;
            margin-bottom: 10px;
            display: block;
        }

        .copy-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--gold-primary);
            color: var(--gold-light);
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .copy-btn:active {
            background: var(--gold-primary);
            color: #0c0914;
        }

        .file-upload-wrapper {
            position: relative;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .preview-img {
            max-width: 100%;
            max-height: 150px;
            margin-top: 10px;
            border-radius: 6px;
            display: none;
            border: 1px solid var(--border-color);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--yellow-accent), var(--gold-primary));
            color: #0c0914;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .history-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
        }

        .history-title {
            color: var(--gold-light);
            font-size: 16px;
            margin-bottom: 15px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .status-pending { color: var(--warning-orange); }
    </style>
</head>
<body>

    <div class="wallet-header">
        <h1>المحفظة والإيداع</h1>
    </div>

    <!-- لوحة تقديم طلب الإيداع -->
    <div class="deposit-card">
        <form onsubmit="handleSubmitDeposit(event)">
            
            <!-- اختيارات العملات الرقمية المتعددة -->
            <div class="form-group">
                <label for="cryptoMethod">اختر عملة الإيداع المتاحة:</label>
                <select id="cryptoMethod" onchange="handleMethodChange()" required>
                    <option value="">-- اختر العملة --</option>
                    <option value="USDT_TRC20">USDT (TRC20)</option>
                    <option value="BTC">Bitcoin (BTC)</option>
                    <option value="ETH">Ethereum (ERC20)</option>
                </select>
            </div>

            <!-- محفظة المسؤول (تظهر تلقائياً حسب نوع العملة المحددة) -->
            <div class="address-box" id="addressBox">
                <label style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px;">عنوان محفظة الاستقبال الخاصة بنا:</label>
                <span class="address-text" id="walletAddress">TYvR6...exampleAddressTRC20</span>
                <button type="button" class="copy-btn" onclick="copyAddress()">نسخ العنوان الحقيقي</button>
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <label for="depositAmount">المبلغ المراد إيداعه (USD):</label>
                <input type="number" id="depositAmount" min="3" placeholder="أدخل القيمة المسددة (أقل حد 3$)" required>
            </div>

            <!-- إرفاق صورة إيصال الدفع بالتأكيد المرئي -->
            <div class="form-group">
                <label>إرفاق صورة أو لقطة شاشة لإيصال الدفع (Screenshot):</label>
                <div class="file-upload-wrapper">
                    <span id="uploadPlaceholder" style="color: var(--gold-primary); font-size: 13px;">اضغط هنا لرفع صورة الإيصال المالي</span>
                    <input type="file" id="receiptFile" accept="image/*" onchange="previewImage(event)" required>
                    <img id="imagePreview" class="preview-img" alt="إيصال الدفع المرفوع">
                </div>
            </div>

            <button type="submit" class="action-btn">تأكيد وإرسال الطلب للمراجعة</button>
        </form>
    </div>

    <!-- سجل متابعة حالة العمليات المقترحة -->
    <div class="history-box">
        <div class="history-title">⏱️ آخر عمليات الإيداع القائمة</div>
        <div class="history-item">
            <div>
                <strong>إيداع USDT (TRC20)</strong><br>
                <span style="color: var(--text-muted); font-size: 11px;">2026-06-22</span>
            </div>
            <div style="text-align: left;">
                <span style="font-weight: bold; color: var(--yellow-accent);">15.00 USD</span><br>
                <span class="status-pending">قيد المراجعة الإدارية</span>
            </div>
        </div>
    </div>

    <script>
        // عناوين المحافظ الخاصة بالمسؤول لإظهارها للعملاء بشكل حقيقي
        const wallets = {
            "USDT_TRC20": "TX9rX8Zq2VbN4mK7eP1wY3xT6sQ8vL2jH5",
            "BTC": "1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa",
            "ETH": "0x742d35Cc6634C0532925a3b844Bc454e4438f44e"
        };

        function handleMethodChange() {
            const method = document.getElementById('cryptoMethod').value;
            const box = document.getElementById('addressBox');
            const addressText = document.getElementById('walletAddress');

            if (method && wallets[method]) {
                addressText.innerText = wallets[method];
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
            }
        }

        function copyAddress() {
            const address = document.getElementById('walletAddress').innerText;
            navigator.clipboard.writeText(address);
            alert("تم نسخ العنوان المالي بنجاح إلى الحافظة!");
        }

        function previewImage(event) {
            const input = event.target;
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('uploadPlaceholder');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                    placeholder.innerText = "تم اختيار الصورة: " + input.files[0].name;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function handleSubmitDeposit(e) {
            e.preventDefault();
            const amount = document.getElementById('depositAmount').value;
            alert("تم إرسال طلب الإيداع بمبلغ " + amount + "$ بنجاح. سيتم التحقق من الإيصال وتحديث رصيدك فوراً.");
        }
    </script>
</body>
</html>
