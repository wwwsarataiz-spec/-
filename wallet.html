<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - المحفظة المالية</title>
    <style>
        :root { --bg:#0c0914; --card:#151124; --gold:#d4af37; --text:#f1ebd9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid rgba(212,175,55,0.2); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: right; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-deposit { background: #2ecc71; color: white; }
        .btn-withdraw { background: #e74c3c; color: white; }
        input { width: 100%; padding: 10px; margin-top: 5px; background: #201a34; border: 1px solid #3d3161; border-radius: 6px; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:var(--gold); margin-bottom:20px;">💼 المحفظة المركزية</h2>
        
        <div class="card" style="text-align: center;">
            <p>الرصيد المتاح للسحب</p>
            <h1 style="color:#fff; margin:10px 0;">0.00 <span style="color:var(--gold);">USDT</span></h1>
        </div>

        <div class="card">
            <h3>📥 قسم الإيداع الآمن</h3>
            <p style="font-size:12px; color:#a39bb4;">قم بتحويل المبلغ إلى المحفظة المعتمدة أدناه وارفع الإثبات:</p>
            <input type="text" value="TYv7Ruxxxxxxxxxxxxxxxxxxx" readonly style="color:var(--gold); text-align:center;">
            <label style="margin-top:10px; display:block; font-size:12px;">أدخل المبلغ المودع:</label>
            <input type="number" placeholder="مثال: 50">
            <button class="btn btn-deposit" onclick="alert('تم إرسال طلب الإيداع للإدارة للتحقق والموافقة.')">تأكيد الإيداع وارسال الإشعار</button>
        </div>

        <div class="card">
            <h3>📤 طلب سحب الأرباح</h3>
            <label>عنوان محفظتك (TRC-20):</label>
            <input type="text" placeholder="T...">
            <label>الكمية المراد سحبها:</label>
            <input type="number" placeholder="الحد الأدنى 10 USDT">
            <button class="btn btn-withdraw" onclick="alert('تم تسجيل طلب السحب. سيتم التحويل بعد مراجعة الإدارة.')">تقديم طلب السحب</button>
        </div>
    </div>
</body>
</html>
