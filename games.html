<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Premium Casino & Games</title>
    <style>
        :root {
            --bg-main: #0c0914;
            --bg-card: #151124;
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --yellow-accent: #ffdf00;
            --text-main: #f1ebd9;
            --text-muted: #a39bb4;
            --input-bg: #1d1833;
            --border-color: rgba(212, 175, 55, 0.25);
            --danger-red: #ff3333;
            --success-green: #00cc66;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 15px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            color: var(--gold-primary);
            font-size: 22px;
        }

        .balance-bar {
            background: linear-gradient(135deg, var(--bg-card), #1e183a);
            border: 1px solid var(--gold-primary);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: var(--yellow-accent);
            margin-bottom: 20px;
        }

        .game-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--yellow-accent), var(--gold-primary));
            color: #0c0914;
            border: none;
        }

        .game-section {
            display: none;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .game-section.active {
            display: block;
        }

        .bet-group {
            margin-bottom: 15px;
        }

        .bet-group label {
            display: block;
            font-size: 12px;
            color: var(--gold-primary);
            margin-bottom: 6px;
        }

        .bet-input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--yellow-accent), var(--gold-primary));
            color: #0c0914;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* نمط لعبة الدجاجة */
        .chicken-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .chicken-tile {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            height: 70px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }

        /* نمط عجلة الحظ */
        .wheel-container {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .wheel {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid var(--gold-primary);
            margin: 0 auto;
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1);
            background: conic-gradient(
                var(--bg-main) 0deg 60deg, 
                var(--gold-primary) 60deg 120deg, 
                var(--input-bg) 120deg 180deg, 
                var(--yellow-accent) 180deg 240deg, 
                #2a1b4e 240deg 300deg,
                var(--danger-red) 300deg 360deg
            );
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid var(--yellow-accent);
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* نمط النرد */
        .dice-display {
            font-size: 48px;
            text-align: center;
            margin: 15px 0;
            color: var(--yellow-accent);
        }

        .log-box {
            background-color: #0c0914;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>صالة الألعاب والمحاكاة الملكية</h1>
    </div>

    <div class="balance-bar">
        رصيد الحساب الحالي: $<span id="userBalance">100.00</span>
    </div>

    <div class="game-tabs">
        <button class="tab-btn active" onclick="switchGame('chicken')">🍗 لعبة الدجاجة</button>
        <button class="tab-btn" onclick="switchGame('wheel')">🎡 العجلة</button>
        <button class="tab-btn" onclick="switchGame('dice')">🎲 النرد الآمن</button>
    </div>

    <div id="chickenGame" class="game-section active">
        <h3>لعبة الدجاجة الموزونة</h3>
        <div class="bet-group" style="margin-top:10px;">
            <label>مبلغ الرهان ($):</label>
            <input type="number" id="chickenBet" class="bet-input" value="1" min="0.5">
        </div>
        <button class="action-btn" onclick="startChickenGame()">ابدأ الجولة</button>
        
        <div class="chicken-grid" id="chickenGrid">
            </div>
        <div class="log-box" id="chickenLog">اضغط على "ابدأ الجولة" للبدء في فتح الأطباق.</div>
    </div>

    <div id="wheelGame" class="game-section">
        <h3>عجلة الحظ الرقمية</h3>
        <div class="bet-group" style="margin-top:10px;">
            <label>مبلغ الرهان ($):</label>
            <input type="number" id="wheelBet" class="bet-input" value="1" min="0.5">
        </div>
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheelDisk"></div>
        </div>
        <button class="action-btn" onclick="spinWheel()">تدوير العجلة</button>
        <div class="log-box" id="wheelLog">جرب حظك لتضاعف رهانك طبقاً لخوارزمية المنصة.</div>
    </div>

    <div id="diceGame" class="game-section">
        <h3>محاكاة النرد الذكي</h3>
        <div class="bet-group" style="margin-top:10px;">
            <label>مبلغ الرهان ($):</label>
            <input type="number" id="diceBet" class="bet-input" value="1" min="0.5">
        </div>
        <div class="bet-group">
            <label>توقع نتيجة النرد الإجمالية:</label>
            <select id="dicePrediction" class="bet-input" style="appearance:none;-webkit-appearance:none;">
                <option value="over">أعلى من 50 (ربح X1.9)</option>
                <option value="under">أقل من 50 (ربح X1.9)</option>
            </select>
        </div>
        <div class="dice-display" id="diceResult">00</div>
        <button class="action-btn" onclick="rollDice()">رمي النرد</button>
        <div class="log-box" id="diceLog">الخوارزمية مبرمجة لضمان ميزة تفوق السيرفر المستدامة.</div>
    </div>

    <script>
        let balance = 100.00;
        let chickenActive = false;
        let chickenMines = [];
        let chickenBetAmount = 0;
        let openedTilesCount = 0;

        function updateBalanceView() {
            document.getElementById('userBalance').innerText = balance.toFixed(2);
        }

        function switchGame(game) {
            document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if(game === 'chicken') document.getElementById('chickenGame').classList.add('active');
            if(game === 'wheel') document.getElementById('wheelGame').classList.add('active');
            if(game === 'dice') document.getElementById('diceGame').classList.add('active');
        }

        // --- خوارزمية لعبة الدجاجة ---
        function startChickenGame() {
            let bet = parseFloat(document.getElementById('chickenBet').value);
            if(bet > balance) { alert("رصيدك غير كافٍ!"); return; }
            
            balance -= bet;
            chickenBetAmount = bet;
            updateBalanceView();
            
            chickenActive = true;
            openedTilesCount = 0;
            document.getElementById('chickenLog').innerText = "تم قفل الأطباق! اختر طبقاً واحداً بحذر.";
            
            // خوارزمية السيرفر: توزيع القنابل بشكل يضمن زيادة الخسارة تصاعدياً
            // نضع قنبلتين في أماكن عشوائية لشبكة 3x3
            chickenMines = [];
            while(chickenMines.length < 2) {
                let r = Math.floor(Math.random() * 9);
                if(!chickenMines.includes(r)) chickenMines.push(r);
            }

            const grid = document.getElementById('chickenGrid');
            grid.innerHTML = '';
            for(let i=0; i<9; i++) {
                let tile = document.createElement('div');
                tile.className = 'chicken-tile';
                tile.innerText = '🍽️';
                tile.onclick = () => revealChickenTile(i, tile);
                grid.appendChild(tile);
            }
        }

        function revealChickenTile(index, tileElement) {
            if(!chickenActive) return;
            
            // خوارزمية الـ House Edge المضافة يدوياً: إذا ربح اللاعب مرتين متتاليتين في الجولة،
            // يرتفع احتمال انفجار الطبق الثالث تلقائياً بنسبة 75% لحماية الخزنة
            if (openedTilesCount >= 2 && Math.random() < 0.75) {
                if(!chickenMines.includes(index)) chickenMines.push(index); 
            }

            if(chickenMines.includes(index)) {
                tileElement.innerText = '💣';
                tileElement.style.borderColor = 'var(--danger-red)';
                document.getElementById('chickenLog').innerText = "انفجرت القنبلة! خسرت الرهان الكلي.";
                document.getElementById('chickenLog').style.color = 'var(--danger-red)';
                chickenActive = false;
            } else {
                tileElement.innerText = '🍗';
                tileElement.style.borderColor = 'var(--success-green)';
                openedTilesCount++;
                let currentWin = chickenBetAmount * (1 + (openedTilesCount * 0.35));
                balance += currentWin;
                updateBalanceView();
                document.getElementById('chickenLog').innerText = `ممتاز! وجدت دجاجة شهية. ربحت وصعد رصيدك بـ $${currentWin.toFixed(2)}`;
                document.getElementById('chickenLog').style.color = 'var(--success-green)';
            }
        }

        // --- خوارزمية عجلة الحظ (موزونة لصالح السيرفر) ---
        function spinWheel() {
            let bet = parseFloat(document.getElementById('wheelBet').value);
            if(bet > balance) { alert("رصيدك غير كافٍ!"); return; }
            
            balance -= bet;
            updateBalanceView();

            // توليد زاوية دوران عشوائية ولكن النتيجة النهائية محكومة برياضيات الكازينو
            let randomChance = Math.random();
            let degree = 0;
            let multiplier = 0;
            let statusText = "";

            if (randomChance < 0.60) {
                // 60% احتمال الخسارة الكاملة (الوقوف على قطاع الخسارة X0)
                degree = 1800 + 330; 
                multiplier = 0;
                statusText = "حظاً سعيداً المرة القادمة! خسرت قيمة الرهان.";
            } else if (randomChance < 0.90) {
                // 30% احتمال استرداد نصف الرهان فقط X0.5
                degree = 1800 + 150;
                multiplier = 0.5;
                statusText = "استرداد جزئي! حصلت على نصف رهانك فقط.";
            } else {
                // 10% فقط احتمال الفوز والمضاعفة X1.5
                degree = 1800 + 90;
                multiplier = 1.5;
                statusText = "رائع! ضاعفت رهانك بمعدل X1.5!";
            }

            const wheelDisk = document.getElementById('wheelDisk');
            wheelDisk.style.transform = `rotate(${degree}deg)`;

            document.getElementById('wheelLog').innerText = "العجلة تدور الآن بصخب...";
            
            setTimeout(() => {
                let winAmount = bet * multiplier;
                balance += winAmount;
                updateBalanceView();
                document.getElementById('wheelLog').innerText = statusText;
            }, 3000);
        }

        // --- خوارزمية لعبة النرد الذكي ---
        function rollDice() {
            let bet = parseFloat(document.getElementById('diceBet').value);
            if(bet > balance) { alert("رصيدك غير كافٍ!"); return; }
            
            balance -= bet;
            updateBalanceView();

            const pred = document.getElementById('dicePrediction').value;
            
            // خوارزمية التحكم بالنرد: السيرفر يولد النتيجة طبقاً لـ House Edge بنسبة 54% لصالح السيرفر دائماً
            let diceRoll;
            let serverDecidesLoss = Math.random() < 0.54; 

            if(serverDecidesLoss) {
                // توليد رقم خسارة متعمد بناء على رغبة المستخدم
                diceRoll = (pred === 'over') ? Math.floor(Math.random() * 49) + 1 : Math.floor(Math.random() * 49) + 51;
            } else {
                // توليد رقم عشوائي طبيعي
                diceRoll = Math.floor(Math.random() * 100) + 1;
            }

            document.getElementById('diceResult').innerText = diceRoll;

            let isWin = false;
            if(pred === 'over' && diceRoll > 50) isWin = true;
            if(pred === 'under' && diceRoll < 50) isWin = true;

            if(isWin) {
                let winAmount = bet * 1.9;
                balance += winAmount;
                document.getElementById('diceLog').innerText = `مبروك! النتيجة ${diceRoll} وتطابق توقعك. ربحت $${winAmount.toFixed(2)}`;
                document.getElementById('diceLog').style.color = 'var(--success-green)';
            } else {
                document.getElementById('diceLog').innerText = `للحظ أحكام! النتيجة ${diceRoll}. تفوق السيرفر هذه المرة.`;
                document.getElementById('diceLog').style.color = 'var(--danger-red)';
            }
            updateBalanceView();
        }
    </script>
</body>
</html>
