<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - بوابة الدخول</title>
    <style>
        :root { --bg: #0c0914; --card: #151124; --gold: #d4af37; --purple: #6c5ce7; }
        body { background: var(--bg); color: #f1ebd9; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 90%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); text-align: right; }
        h2 { color: var(--gold); text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e1735; border: 1px solid #3d3161; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--purple), #4834d4); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .link { text-align: center; font-size: 13px; color: #a39bb4; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 id="title">تسجيل الدخول</h2>
        <form id="form">
            <input type="text" id="name" placeholder="الاسم الثلاثي كاملاً" style="display: none;">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="tel" id="phone" placeholder="رقم الهاتف مع مفتاح الدولة" style="display: none;">
            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <button type="submit" class="btn" id="btnText">دخول</button>
        </form>
        <div class="link" onclick="toggleMode()" id="switchText">ليس لديك حساب؟ إنشاء حساب جديد</div>
        <div class="link" style="color: var(--gold);" onclick="forgot()">نسيت كلمة المرور؟ استعادة الحساب</div>
    </div>
    <script>
        let isLogin = true; // الافتراضي هو تسجيل الدخول لمنع الدخول العشوائي للمنصة

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
            document.getElementById('name').style.display = isLogin ? 'none' : 'block';
            document.getElementById('name').required = !isLogin;
            document.getElementById('phone').style.display = isLogin ? 'none' : 'block';
            document.getElementById('phone').required = !isLogin;
            document.getElementById('btnText').innerText = isLogin ? 'دخول' : 'تسجيل حساب جديد';
            document.getElementById('switchText').innerText = isLogin ? 'ليس لديك حساب؟ إنشاء حساب جديد' : 'لديك حساب؟ تسجيل الدخول';
        }

        function forgot() {
            let mail = prompt("أدخل بريدك الإلكتروني لإرسال كود الاستعادة:");
            if(mail) alert("تم إرسال كود استعادة الحساب للبريد الإلكتروني بنجاح.");
        }

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            
            if (isLogin) {
                // عملية تسجيل الدخول والتحقق
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    alert("خطأ: " + data.message);
                }
            } else {
                // عملية إنشاء الحساب الجديد
                const fullName = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, phone, password })
                });
                const data = await res.json();
                if(data.success) {
                    alert("تم إنشاء الحساب بنجاح! يرجى الدخول الآن.");
                    toggleMode();
                } else {
                    alert("فشل التسجيل: " + data.error);
                }
            }
        });
    </script>
</body>
</html>
