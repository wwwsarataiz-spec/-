<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Nexora - تسجيل الدخول</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: var(--bg);
    }
    .login-page {
      max-width: 420px;
      width: 100%;
    }
    .login-box {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      padding: 40px 30px;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .login-box h2 {
      color: var(--gold);
      font-size: clamp(28px, 6vw, 36px);
      margin-bottom: 20px;
    }
    .login-box h2 i {
      margin-left: 10px;
    }
    .login-box .subtitle {
      color: #8a7fa0;
      font-size: clamp(13px, 2.5vw, 15px);
      margin-bottom: 25px;
    }
    .login-box input {
      width: 100%;
      padding: 14px 12px;
      margin: 8px 0;
      background: rgba(30, 23, 53, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      border-radius: 8px;
      font-size: clamp(14px, 2.8vw, 16px);
      transition: 0.3s;
    }
    .login-box input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(212,175,55,0.1);
    }
    .login-box .login-btn {
      background: linear-gradient(135deg, var(--gold), #b8960f);
      color: #000;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 8px;
      font-weight: 700;
      font-size: clamp(16px, 3vw, 18px);
      cursor: pointer;
      margin-top: 15px;
      transition: 0.2s;
    }
    .login-box .login-btn:active { transform: scale(0.96); }
    .login-box .switch-auth {
      color: #8a7fa0;
      margin-top: 15px;
      font-size: clamp(13px, 2.5vw, 15px);
      cursor: pointer;
      transition: 0.3s;
    }
    .login-box .switch-auth:hover { color: var(--gold); }
    .login-box .auth-error {
      color: #e74c3c;
      font-size: clamp(13px, 2.5vw, 15px);
      margin-top: 8px;
      min-height: 24px;
    }
    .login-box .brand-icon {
      font-size: 48px;
      color: var(--gold);
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="brand-icon"><i class="fas fa-crown"></i></div>
      <h2>NEXORA</h2>
      <p class="subtitle">نظام التعدين وإدارة الأصول المتقدم</p>

      <div id="authForm">
        <input type="text" id="loginFullName" placeholder="الاسم الكامل (للتسجيل)" style="display:none;">
        <input type="text" id="loginPhone" placeholder="رقم الجوال (للتسجيل)" style="display:none;">
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <div id="authError" class="auth-error"></div>
        <button class="login-btn" id="authActionBtn" onclick="handleAuth()">تسجيل الدخول</button>
        <div class="switch-auth" id="toggleAuthText" onclick="toggleAuthMode()">ليس لديك حساب؟ سجل الآن</div>
      </div>
    </div>
  </div>

  <!-- scripts -->
  <script src="app.js"></script>
  <script>
    // تهيئة الصفحة: إذا كان المستخدم مسجلاً بالفعل، نوجهه إلى لوحة التحكم
    window.onload = function() {
      const savedUser = localStorage.getItem('nexora_user');
      if (savedUser) {
        try {
          const user = JSON.parse(savedUser);
          if (user && user.approved !== false) {
            window.location.href = '/dashboard';
          }
        } catch(e) {}
      }
      // تعيين الحالة الأولية
      isLoginMode = true;
      const btn = document.getElementById('authActionBtn');
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
      document.getElementById('toggleAuthText').textContent = 'ليس لديك حساب؟ سجل الآن';
      document.getElementById('loginFullName').style.display = 'none';
      document.getElementById('loginPhone').style.display = 'none';
    };

    // هذه الدوال موجودة في app.js، لكننا نعيد تعريفها هنا إذا لزم الأمر
    // (لكنها مستوردة من app.js)
  </script>
</body>
</html>
