<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora - تسجيل الدخول</title>
    <!-- تضمين مكتبة Tailwind CSS وأيقونات FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1e112a 0%, #0d0714 100%);
        }
        .premium-border {
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .premium-input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-between p-4 font-sans">

    <!-- الهيدر العلوي لشعار المنصة -->
    <header class="w-full text-center py-6">
        <h1 class="text-2xl font-bold tracking-widest text-[#d4af37]">NEXORA</h1>
        <p class="text-xs text-purple-400 mt-1 uppercase tracking-wider">Cloud Mining Platform</p>
    </header>

    <!-- كارت تسجيل الدخول الفخم (تأثير الزجاج الضبابي) -->
    <main class="w-full max-w-md mx-auto bg-[#170e22]/80 backdrop-blur-md p-8 rounded-2xl premium-border shadow-2xl my-auto">
        <h2 class="text-xl font-semibold text-center mb-2 text-white">مرحباً بك مجدداً</h2>
        <p class="text-sm text-gray-400 text-center mb-8">قم بتسجيل الدخول لمتابعة جلسة التعدين الخاصة بك</p>

        <form id="loginForm" class="space-y-6">
            <!-- حقل البريد الإلكتروني -->
            <div class="relative">
                <label class="block text-xs font-medium text-[#d4af37] mb-2 mr-1">البريد الإلكتروني</label>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500">
                        <i class="fas fa-envelope text-sm"></i>
                    </span>
                    <input type="email" required class="w-full bg-[#0d0714] premium-border rounded-xl py-3 pr-10 pl-4 text-sm text-white focus:outline-none premium-input transition-all duration-300 placeholder-gray-600" placeholder="name@example.com">
                </div>
            </div>

            <!-- حقل كلمة المرور -->
            <div class="relative">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-medium text-[#d4af37] mr-1">كلمة المرور</label>
                    <a href="#" class="text-xs text-purple-400 hover:text-[#d4af37] transition-colors">نسيت كلمة المرور؟</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500">
                        <i class="fas fa-lock text-sm"></i>
                    </span>
                    <input type="password" required class="w-full bg-[#0d0714] premium-border rounded-xl py-3 pr-10 pl-4 text-sm text-white focus:outline-none premium-input transition-all duration-300 placeholder-gray-600" placeholder="••••••••">
                </div>
            </div>

            <!-- زر تسجيل الدخول -->
            <button type="submit" class="w-full bg-gradient-to-r from-[#d4af37] to-[#b89324] hover:from-[#b89324] hover:to-[#d4af37] text-[#0d0714] font-bold py-3.5 rounded-xl shadow-lg transform active:scale-95 transition-all duration-200 text-sm mt-4">
                تسجيل الدخول <i class="fas fa-sign-in-alt mr-1"></i>
            </button>
        </form>

        <!-- رابط إنشاء حساب جديد -->
        <div class="text-center mt-8 text-sm">
            <span class="text-gray-400">ليس لديك حساب بعد؟</span>
            <a href="register.html" class="text-purple-400 hover:text-[#d4af37] font-medium mr-1 transition-colors underline decoration-dotted">أنشئ حساباً جديداً</a>
        </div>
    </main>

    <!-- الفوتر السفلي وحقوق الحقوق -->
    <footer class="w-full text-center py-4 text-[10px] text-gray-600 tracking-wider">
        &copy; 2026 NEXORA. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
