<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الإدارية الملكية</title>
    <style>
        body { background: #07050c; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .admin-box { max-width: 600px; margin: 0 auto; background: #151124; border: 1px solid #d4af37; border-radius: 12px; padding: 20px; }
        h2 { color: #d4af37; text-align: center; }
        .request-item { background: #201a34; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-approve { background: #2ecc71; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-reject { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>👑 لوحة الإدارة العليا (Nexora Control)</h2>
        <p style="text-align:center; font-size:12px; color:#a39bb4;">إدارة العمليات المعلقة وتعديل سرعات المستخدمين</p>
        
        <h3 style="margin-top:20px; color:#d4af37;">📥 طلبات الإيداع المعلقة:</h3>
        <div class="request-item">
            <div>المستخدم: أحمد العبسي | المبلغ: 100 USDT</div>
            <div>
                <button class="btn-approve" onclick="alert('تم تأكيد الإيداع وإضافة الرصيد')">مواقفة</button>
                <button class="btn-reject" onclick="alert('تم الرفض')">رفض</button>
            </div>
        </div>

        <h3 style="margin-top:20px; color:#d4af37;">⚙️ التحكم في إعدادات بوت التيليجرام:</h3>
        <div style="margin-top:10px;">
            <label style="font-size:13px;">رسالة الترحيب الخاصة بالـ Bot:</label>
            <input type="text" value="مرحباً بك في بوت نكسورا المطور للتعدين" style="width:100%; padding:8px; background:#201a34; border:1px solid #3d3161; color:white; border-radius:6px; margin-top:5px;">
            <button style="margin-top:10px; padding:8px; background:#6c5ce7; color:white; border:none; border-radius:6px; width:100%; font-weight:bold; cursor:pointer;" onclick="alert('تم تحديث إعدادات البوت تلقائياً')">حفظ تحديثات البوت</button>
        </div>
    </div>
</body>
</html>
