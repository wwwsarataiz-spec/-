<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Nexora Premium - النظام المتكامل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===== طبقة تسجيل الدخول ===== -->
<div id="loginOverlay">
  <div class="login-box">
    <h2><i class="fas fa-crown"></i> NEXORA</h2>
    <div id="authForm">
      <input type="text" id="loginFullName" placeholder="الاسم الكامل (للتسجيل)" style="display:none;">
      <input type="text" id="loginPhone" placeholder="رقم الجوال (للتسجيل)" style="display:none;">
      <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
      <input type="password" id="loginPassword" placeholder="كلمة المرور">
      <div id="authError" class="auth-error"></div>
      <button class="login-btn" id="authActionBtn" onclick="handleAuth()">تسجيل الدخول</button>
      <div class="switch-auth" id="toggleAuthText" onclick="toggleAuthMode()">ليس لديك حساب؟ سجل الآن</div>
    </div>
  </div>
</div>

<!-- ===== باقي الصفحة (نفس المحتوى السابق) ===== -->
<div class="container" id="mainApp">
  <!-- ... كل المحتوى الآخر كما هو ... -->
</div>

<!-- ===== شريط التنقل السفلي ===== -->
<div class="bottom-nav"><!-- ... --></div>

<script src="app.js"></script>
<script src="mining.js"></script>
<script src="games.js"></script>
<script src="ads.js"></script>
<script>
  window.onload = function() {
    // استعادة جلسة المستخدم
    const savedUser = localStorage.getItem('nexora_user');
    if (savedUser) {
      try {
        const user = JSON.parse(savedUser);
        if (user.approved !== false) {
          currentUser = user;
          document.getElementById('loginOverlay').classList.add('hidden');
          document.getElementById('liveBalance').innerHTML = user.balance.toFixed(6) + ' <small>USDT</small>';
          currentBalance = user.balance;
          casinoBalance = user.casinoBalance || 5.000000;
          document.getElementById('casinoBalance').innerHTML = casinoBalance.toFixed(6) + ' <small>USDT</small>';
          points = user.points || 0;
          document.getElementById('pointsBalanceDisplay').textContent = `نقاطك: ${points}`;
          if (typeof loadUserPlans === 'function') loadUserPlans(user);
        }
      } catch(e) {
        localStorage.removeItem('nexora_user');
      }
    }
    // تهيئة المكونات
    if (typeof initTicker === 'function') initTicker();
    if (typeof renderPlans === 'function') renderPlans();
    if (typeof renderAdminPlans === 'function') renderAdminPlans();
    if (typeof refreshAdminData === 'function') refreshAdminData();
    if (typeof updateInvestmentCalc === 'function') updateInvestmentCalc();
    if (typeof initThreeJS === 'function') initThreeJS();
  };
  // ... باقي الكود (نفسه)
</script>
</body>
</html>
