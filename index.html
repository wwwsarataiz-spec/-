<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نيكسورا – Nexora</title>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0d0b0a;
      display: flex;
      color: #f0e6d5;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 260px;
      background: rgba(20, 18, 18, 0.95);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(212, 175, 55, 0.2);
      padding: 2rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      min-height: 100vh;
      position: sticky;
      top: 0;
      height: 100vh;
      box-shadow: -4px 0 30px rgba(0,0,0,0.5);
    }

    .sidebar .brand {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 2px;
      color: #d4af37;
      border-bottom: 1px solid rgba(212, 175, 55, 0.15);
      padding-bottom: 1rem;
    }
    .sidebar .brand span {
      font-weight: 700;
    }

    .sidebar .user-section {
      background: rgba(255,255,255,0.03);
      border-radius: 1.5rem;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid rgba(212, 175, 55, 0.08);
    }
    .sidebar .user-section .avatar {
      font-size: 2.5rem;
      background: #d4af37;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.7rem;
      color: #0d0b0a;
      font-weight: bold;
    }
    .sidebar .user-section .username {
      font-size: 1.1rem;
      font-weight: 500;
      color: #f5e6c8;
    }
    .sidebar .user-section .balance {
      font-size: 0.9rem;
      color: #a3947a;
      margin-top: 0.2rem;
    }
    .sidebar .user-section .balance span {
      color: #d4af37;
      font-weight: 600;
    }

    .sidebar .logout-btn {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: #d4af37;
      padding: 0.6rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.95rem;
      margin-top: auto;
      text-align: center;
    }
    .sidebar .logout-btn:hover {
      background: rgba(212, 175, 55, 0.25);
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex: 1;
      padding: 2rem 3rem;
      background: radial-gradient(circle at 20% 20%, #1e1a1a, #0b0b0b);
    }
    .main-content h2 {
      font-weight: 300;
      color: #d4af37;
      margin-bottom: 1rem;
    }
    .main-content p {
      color: #b0a48a;
      line-height: 1.8;
    }

    /* ===== LOGIN OVERLAY ===== */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      padding: 1.5rem;
    }
    .overlay.hidden {
      display: none;
    }

    .overlay .card {
      background: rgba(20, 18, 18, 0.95);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    }
    .overlay .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .overlay .brand h1 {
      font-size: 2rem;
      font-weight: 300;
      color: #f5e6c8;
    }
    .overlay .brand h1 span {
      color: #d4af37;
      font-weight: 600;
    }
    .overlay .brand p {
      color: #7a6e5b;
      font-size: 0.85rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
    }
    .tabs input[type="radio"] { display: none; }
    .tabs label {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      background: rgba(255,255,255,0.03);
      border-radius: 3rem;
      color: #8a7e6b;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
      font-size: 0.95rem;
    }
    #tabLogin:checked ~ .tabs label[for="tabLogin"],
    #tabSignup:checked ~ .tabs label[for="tabSignup"] {
      background: rgba(212, 175, 55, 0.15);
      border-color: #d4af37;
      color: #f5e6c8;
    }

    .form-box {
      display: none;
      flex-direction: column;
      gap: 1.2rem;
    }
    #tabLogin:checked ~ .forms #loginForm { display: flex; }
    #tabSignup:checked ~ .forms #signupForm { display: flex; }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .input-group label {
      font-size: 0.85rem;
      color: #c5b59b;
    }
    .input-group input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2.2rem;
      padding: 0.7rem 1.2rem;
      font-size: 1rem;
      color: #f0e6d5;
      outline: none;
      transition: 0.2s;
    }
    .input-group input:focus {
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.05);
    }

    .btn-primary {
      background: linear-gradient(135deg, #d4af37, #b8962e);
      border: none;
      border-radius: 3rem;
      padding: 0.8rem;
      font-weight: 600;
      color: #0d0b0a;
      cursor: pointer;
      transition: 0.25s;
      font-size: 1rem;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
    }

    .error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.4rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
        padding: 1.2rem 0.8rem;
      }
      .main-content {
        padding: 1.5rem;
      }
    }
    @media (max-width: 600px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        min-height: auto;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 0.8rem 1rem;
        gap: 0.5rem;
        border-left: none;
        border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        position: relative;
      }
      .sidebar .brand { flex: 1; }
      .sidebar .user-section { flex: 2; display: flex; align-items: center; gap: 0.8rem; }
      .sidebar .user-section .avatar { width: 40px; height: 40px; font-size: 1.8rem; margin: 0; }
      .sidebar .logout-btn { margin-top: 0; }
      .main-content { padding: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
  <div class="brand">نيكسورا <span>✦</span></div>
  <div class="user-section">
    <div class="avatar">👤</div>
    <div>
      <div class="username" id="sidebarUsername">زائر</div>
      <div class="balance">الرصيد: <span id="sidebarBalance">٠</span></div>
    </div>
  </div>
  <button class="logout-btn" id="logoutBtn">🚪 تسجيل الخروج</button>
</aside>

<!-- ===== MAIN CONTENT ===== -->
<main class="main-content">
  <h2>مرحباً بك في نيكسورا</h2>
  <p>
    منصة متطورة لإدارة الحسابات والرصيد. سجل الدخول أو أنشئ حساباً للبدء.
  </p>
  <p style="margin-top:1rem; color:#6a5f4e;">
    ✦ هذه الواجهة التجريبية تعرض نظام المصادقة والجلسات.
  </p>
</main>

<!-- ===== LOGIN OVERLAY ===== -->
<div class="overlay" id="loginOverlay">
  <div class="card">
    <div class="brand">
      <h1>نيكسورا <span>✦</span></h1>
      <p>سجل دخولك أو أنشئ حساباً</p>
    </div>

    <!-- Radio controls -->
    <input type="radio" name="tab" id="tabLogin" checked />
    <input type="radio" name="tab" id="tabSignup" />

    <div class="tabs">
      <label for="tabLogin">تسجيل الدخول</label>
      <label for="tabSignup">إنشاء حساب</label>
    </div>

    <div class="forms">
      <!-- Login Form -->
      <form class="form-box" id="loginForm">
        <div class="input-group">
          <label for="loginEmail">البريد الإلكتروني</label>
          <input type="email" id="loginEmail" placeholder="example@domain.com" required />
        </div>
        <div class="input-group">
          <label for="loginPassword">كلمة المرور</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <div class="error-msg" id="loginError"></div>
        <button class="btn-primary" type="submit">دخول</button>
      </form>

      <!-- Signup Form -->
      <form class="form-box" id="signupForm">
        <div class="input-group">
          <label for="signupName">الاسم الكامل</label>
          <input type="text" id="signupName" placeholder="أحمد محمد" required />
        </div>
        <div class="input-group">
          <label for="signupPhone">رقم الجوال</label>
          <input type="tel" id="signupPhone" placeholder="05xxxxxxxx" required />
        </div>
        <div class="input-group">
          <label for="signupEmail">البريد الإلكتروني</label>
          <input type="email" id="signupEmail" placeholder="example@domain.com" required />
        </div>
        <div class="input-group">
          <label for="signupPassword">كلمة المرور</label>
          <input type="password" id="signupPassword" placeholder="••••••••" required />
        </div>
        <div class="error-msg" id="signupError"></div>
        <button class="btn-primary" type="submit">إنشاء الحساب</button>
      </form>
    </div>
  </div>
</div>

<!-- ===== SCRIPT ===== -->
<script src="app.js"></script>
</body>
</html>
