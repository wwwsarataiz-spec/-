<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Premium - التعدين والاستثمار</title>
    <style>
        :root {
            --bg-main: #0c0914;
            --bg-card: #151124;
            --gold-primary: #d4af37;
            --purple-accent: #6c5ce7;
            --text-main: #f1ebd9;
            --text-muted: #a39bb4;
            --border-color: rgba(212, 175, 55, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 20px; text-align: center; }
        .container { max-width: 450px; margin: 0 auto; }
        .header { margin-bottom: 25px; }
        .gold-text { color: var(--gold-primary); text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        
        /* كرت الرصيد والتعدين */
        .card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .balance { font-size: 32px; font-weight: bold; margin: 10px 0; color: #fff; }
        
        /* أزرار العمليات المالية */
        .action-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-deposit { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
        .btn-withdraw { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        
        /* قسم الكازينو / ألعاب المخاطرة */
        .casino-box { background: linear-gradient(145deg, var(--bg-card), #1e133a); border: 1px solid var(--purple-accent); }
        .btn-game { background: linear-gradient(135deg, var(--purple-accent), #4834d4); color: white; width: 100%; margin-top: 15px; box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="gold-text">NEXORA PREMIUM</h1>
            <p style="color: var(--text-muted); font-size: 13px;">نظام التعدين السحابي وإدارة الأصول</p>
        </div>

        <!-- لوحة التحكم بالرصيد -->
        <div class="card">
            <p style="color: var(--text-muted);">إجمالي الرصيد الاستثماري</p>
            <div class="balance" id="userBalance">0.00 <span style="font-size: 16px; color: var(--gold-primary);">USDT</span></div>
            <p style="font-size: 12px; color: #2ecc71;">⚡ محرك التعدين نشط ويعمل حالياً</p>
        </div>

        <!-- أزرار الإيداع والسحب الدقيقة -->
        <div class="action-group">
            <button class="btn btn-deposit" onclick="handleDeposit()">📥 إيداع أموال</button>
            <button class="btn btn-withdraw" onclick="handleWithdraw()">📤 سحب الأرباح</button>
        </div>

        <!-- قسم الكازينو وألعاب الحظ (Risk Game) -->
        <div class="card casino-box">
            <h3 class="gold-text">🎰 صالة الألعاب الملكية (Risk Game)</h3>
            <p style="color: var(--text-muted); font-size: 12px; margin-top: 5px;">ضاعف أرباح التعدين الخاصة بك فوراً أو خاطر بها</p>
            <button class="btn btn-game" onclick="openCasino()">🎮 دخول صالة الحظ</button>
        </div>
    </div>

    <script>
        function handleDeposit() {
            alert("📥 للإيداع وتفعيل باقات التعدين VIP، يرجى التواصل المباشر مع الإدارة لإرسال عنوان المحفظة الخاص بك.");
        }

        function handleWithdraw() {
            const amount = prompt("أدخل الكمية التي تريد سحبها (الحد الأدنى 10 USDT):");
            if (amount) {
                alert(`📤 تم تقديم طلب سحب بقيمة ${amount} USDT بنجاح. جاري المراجعة من قِبل مسؤول النظام.`);
            }
        }

        function openCasino() {
            alert("🎰 مرحباً بك في لعبة الحظ والمخاطرة! ميزة مضاعفة الرصيد ستكون متاحة بالكامل في التحديث القادم بعد ربط حسابك.");
        }
    </script>
</body>
</html>
