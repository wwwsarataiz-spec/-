<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة التعدين الذكي</title>
    <style>
        /* تصميم أساسي فاخر (أسود وذهبي) */
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --gold: #c5a059;
            --gold-hover: #e5c158;
            --text-color: #ffffff;
            --text-muted: #c5a059aa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background-color: var(--container-bg);
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.1);
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .screen.active {
            display: flex;
        }

        h2 {
            color: var(--gold);
            margin-bottom: 25px;
            font-size: 24px;
            text-align: center;
        }

        /* تصميم الحقول والأزرار */
        .input-group {
            width: 100%;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background-color: #0b0c10;
            border: 1px solid #45f3ff00;
            border-bottom: 2px solid var(--gold);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            border-radius: 4px;
            outline: none;
            transition: 0.3s;
            text-align: right;
        }

        input:focus {
            border-bottom-color: var(--gold-hover);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--gold), #e5c158);
            border: none;
            color: #0b0c10;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.3);
        }

        /* واجهة التعدين */
        .mining-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%);
            border: 4px dashed var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            position: relative;
            animation: rotate 20s linear infinite;
        }

        .mining-circle::before {
            content: '🪙';
            font-size: 60px;
            animation: pulse 2s ease-in-out infinite;
        }

        .balance-display {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 10px;
        }

        .balance-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .status-badge {
            background-color: rgba(197, 160, 89, 0.1);
            color: var(--gold);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid var(--gold);
        }

        /* الحركات الأنيميشن */
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="loginScreen" class="screen active">
            <h2>تسجيل الدخول للمنصة</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            </div>
            <button onclick="handleLogin()">دخول</button>
        </div>

        <div id="miningScreen" class="screen">
            <div class="status-badge">جاري التعدين بنجاح السيرفر نشط</div>
            
            <div class="mining-circle"></div>
            
            <div class="balance-label">رصيدك الحالي</div>
            <div class="balance-display"><span id="balance">0.0000</span></div>
            
            <div style="color: var(--gold); margin-top: 10px;" id="welcomeMessage"></div>
        </div>

    </div>

    <script>
        // منطق الواجهة والعداد
        let balance = 0.0000;
        let miningInterval;

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();

            if (username === "" || email === "") {
                alert("يرجى ملء جميع الحقول!");
                return;
            }

            // إخفاء شاشة الدخول وإظهار شاشة التعدين
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('miningScreen').classList.add('active');
            
            // تخصيص رسالة الترحيب باسم المستخدم
            document.getElementById('welcomeMessage').innerText = `مرحباً، ${username}`;

            // بدء التعدين التلقائي (محاكاة زيادة الرصيد في الخلفية)
            startMining();
        }

        function startMining() {
            // زيادة الرصيد بشكل تلقائي كل ثانية لمحاكاة التعدين السحابي السيرفر
            miningInterval = setInterval(() => {
                balance += 0.0015; 
                document.getElementById('balance').innerText = balance.toFixed(4);
            }, 1000);
        }
    </script>
</body>
</html>
