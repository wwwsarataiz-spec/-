<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Nexora - النظام المتكامل</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ===== الأساسيات ===== */
    :root {
      --bg: #0a0815;
      --card: rgba(21, 17, 36, 0.85);
      --gold: #d4af37;
      --purple: #6c5ce7;
      --text: #f1ebd9;
      --radius: 16px;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body {
      background: var(--bg);
      color: var(--text);
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background-image: radial-gradient(ellipse at 10% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 90% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
    }
    .container {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 0 8px 80px 8px;
    }
    .gold-text { color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.2); }

    /* ===== شريط التنقل السفلي (بدون إدارة) ===== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(21, 17, 36, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(212,175,55,0.15);
      display: flex;
      justify-content: space-around;
      padding: 6px 0 8px;
      z-index: 1000;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.8);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #6a5f7a;
      font-size: 10px;
      cursor: pointer;
      transition: 0.3s;
      padding: 4px 6px;
      border-radius: 8px;
      border: none;
      background: transparent;
      font-weight: 600;
      gap: 2px;
    }
    .nav-item i { font-size: 20px; }
    .nav-item.active { color: var(--gold); text-shadow: 0 0 15px rgba(212,175,55,0.3); }
    .nav-item:hover { color: var(--gold); }

    /* ===== الأقسام ===== */
    .section { display: none; animation: fadeIn 0.4s ease; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }

    /* ===== البطاقات ===== */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      text-align: right;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: 0.3s;
    }
    .card:hover { border-color: rgba(212,175,55,0.3); }

    .balance {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin: 8px 0;
      text-shadow: 0 0 30px rgba(212,175,55,0.1);
    }
    .balance small { color: var(--gold); font-size: clamp(14px,3vw,20px); }

    .btn {
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: clamp(14px,3vw,16px);
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-gold { background: linear-gradient(135deg, var(--gold), #b8960f); color: #000; }
    .btn-green { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; }
    .btn-red { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; }
    .btn-purple { background: linear-gradient(135deg, var(--purple), #5a4bd1); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: #fff; }

    input, select, textarea {
      width: 100%;
      padding: 12px 10px;
      margin: 6px 0;
      background: rgba(30, 23, 53, 0.7);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      border-radius: 8px;
      font-size: clamp(13px,3vw,15px);
      box-sizing: border-box;
      direction: rtl;
      transition: 0.3s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.1); }
    input::placeholder, textarea::placeholder { color: #6a5f7a; }

    /* ===== الرأس مع أيقونة الترس ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding: 0 4px;
    }
    .header h1 {
      font-size: clamp(22px, 6vw, 30px);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(212,175,55,0.15);
    }
    .header .settings-icon {
      font-size: 24px;
      color: #8a7fa0;
      cursor: pointer;
      transition: 0.3s;
      padding: 8px;
      border-radius: 50%;
    }
    .header .settings-icon:hover {
      color: var(--gold);
      background: rgba(212,175,55,0.1);
    }
    .welcome-message {
      font-size: clamp(14px, 3vw, 18px);
      color: #8a7fa0;
      margin-top: 4px;
      padding: 0 4px;
    }
    .welcome-message span { color: var(--gold); font-weight: 700; }

    /* ===== أقسام الإدارة ===== */
    .admin-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0;
    }
    .admin-stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--glass-border);
    }
    .admin-stat-card .number {
      font-size: clamp(22px,5vw,30px);
      font-weight: 700;
      color: var(--gold);
    }
    .admin-stat-card .label {
      font-size: clamp(11px,2vw,13px);
      color: #8a7fa0;
    }
    .pending-user {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: var(--glass-bg);
      border-radius: 8px;
      margin: 4px 0;
      font-size: clamp(12px,2.5vw,14px);
      backdrop-filter: blur(4px);
    }
    .pending-user .actions button {
      background: #2ecc71;
      border: none;
      color: #000;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      margin: 0 4px;
    }
