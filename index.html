<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منجمي الذهبي</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #0b0f19; color: #fff; }
        .hidden { display: none !important; }
        .container { max-width: 450px; margin: 0 auto; }
        .card { background: #151e2f; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #2b3b54; }
        .btn-primary { background: #2e7d32; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-primary:disabled { opacity: 0.6; }
        .btn-gold { background: #f5a623; color: #000; }
        .btn-purple { background: #6c5ce7; }
        .btn-danger { background: #e74c3c; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2b3b54; background: #0b0f19; color: white; box-sizing: border-box; }
        .balance { font-size: 32px; font-weight: bold; color: #f5c518; text-align: center; margin: 10px 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-box { background: #0b0f19; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #2b3b54; cursor: pointer; }
        .slot { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .slot-icon { font-size: 50px; width: 60px; height: 60px; background: #0b0f19; border-radius: 10px; display: flex; justify-content: center; align-items: center; border: 2px solid #f5a623; }
        .menu-btn { background: transparent; border: none; color: #fff; font-size: 14px; cursor: pointer; margin: 5px; }
        .tabs { display: flex; justify-content: space-around; border-bottom: 1px solid #2b3b54; margin-bottom: 20px; padding-bottom: 10px; }
        .tabs button { background: none; border: none; color: #888; font-size: 16px; cursor: pointer; padding: 5px 10px; }
        .tabs button.active { color: #f5c518; border-bottom: 2px solid #f5c518; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <!-- شاشة تسجيل الدخول -->
        <div id="screenLogin" class="card">
            <h2 style="text-align:center;">⛏️ منجم الذهب</h2>
            <input type="text" id="loginName" placeholder="الاسم (مثل: أحمد)">
            <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            <button class="btn-primary btn-gold" onclick="login()">دخول / تسجيل</button>
            <p style="font-size:12px; color:#aaa; text-align:center; margin-top:10px;">سيتم حفظ النقاط الخاصة بك باستمرار.</p>
        </div>

        <!-- شاشة اللعب الرئيسية (تظهر بعد الدخول) -->
        <div id="screenMain" class="hidden">
            <!-- القائمة العلوية -->
            <div class="tabs">
                <button class="active" onclick="switchTab('mining')">⛏️ التعدين</button>
                <button onclick="switchTab('store')">🛒 المتجر</button>
                <button onclick="switchTab('casino')">🎰 كازينو</button>
            </div>

            <!-- قسم التعدين -->
            <div id="tabMining" class="card hidden">
                <h3>مرحباً، <span id="displayName">-</span></h3>
                <div class="balance"><span id="displayPoints">0</span> 💰</div>
                <small style="color:#aaa; display:block; text-align:center;">الخطة الحالية: <strong id="displayPlan">مجاني</strong></small>
                <button class="btn-primary" onclick="mine()">⛏️ استخراج النقاط (تعدين)</button>
                <p id="mineMsg" style="font-size:14px; color:#aaa; text-align:center; margin-top:10px;"></p>
                
                <br>
                <h4 style="border-top:1px solid #2b3b54; padding-top:15px;">خطط التعدين المدفوعة</h4>
                <div class="grid-2" id="plansContainer"></div>
            </div>

            <!-- قسم المتجر (بيع النقاط) -->
            <div id="tabStore" class="card hidden">
                <h4>🛍️ اشترِ نقاطاً إضافية</h4>
                <div class="grid-2" id="storeContainer">
                    <div class="item-box" onclick="buyPoints('100p')">
                        <div style="font-size:24px;">100</div>
                        <small>باقة 100 نقطة</small>
                        <div style="color:#f5c518; margin-top:5px;">💲 5$</div>
                    </div>
                    <div class="item-box" onclick="buyPoints('500p')">
                        <div style="font-size:24px;">500</div>
                        <small>باقة 500 نقطة</small>
                        <div style="color:#f5c518; margin-top:5px;">💲 20$</div>
                    </div>
                    <div class="item-box" onclick="buyPoints('1000p')">
                        <div style="font-size:24px;">1000</div>
                        <small>باقة 1000 نقطة</small>
                        <div style="color:#f5c518; margin-top:5px;">💲 35$</div>
                    </div>
                </div>
                <p id="storeMsg" style="font-size:14px; color:#aaa; text-align:center; margin-top:10px;"></p>
            </div>

            <!-- قسم الكازينو -->
            <div id="tabCasino" class="card hidden">
                <h4>🎰 العب واربح النقاط!</h4>
                <p>اختر مقدار الرهان:</p>
                <div class="grid-2">
                    <button onclick="setBet(10)" class="btn-primary btn-purple" style="margin:0;">10 نقاط</button>
                    <button onclick="setBet(50)" class="btn-primary btn-purple" style="margin:0;">50 نقطة</button>
                </div>
                <div class="slot">
                    <div class="slot-icon" id="slot1">🍒</div>
                    <div class="slot-icon" id="slot2">🍒</div>
                    <div class="slot-icon" id="slot3">🍒</div>
                </div>
                <p style="text-align:center;">الرهان الحالي: <strong id="currentBet">0</strong></p>
                <button class="btn-primary btn-gold" onclick="spinCasino()">🔄 دورة (لعب)</button>
                <p id="casinoMsg" style="font-size:14px; color:#aaa; text-align:center; margin-top:10px;"></p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let currentEmail = "";

        // 1. تسجيل الدخول
        async function login() {
            const name = document.getElementById('loginName').value;
            const email = document.getElementById('loginEmail').value;
            if(!name || !email) return alert('يرجى إدخال الاسم والبريد الإلكتروني');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email })
            });
            const data = await res.json();
            if(data.success) {
                currentEmail = email;
                document.getElementById('screenLogin').classList.add('hidden');
                document.getElementById('screenMain').classList.remove('hidden');
                document.getElementById('displayName').innerText = data.user.name;
                document.getElementById('displayPoints').innerText = data.user.points;
                document.getElementById('displayPlan').innerText = data.user.plan === 'free' ? 'مجاني' : data.user.plan;
                loadPlans();
                switchTab('mining');
            } else {
                alert('خطأ: ' + data.error);
            }
        }

        // 2. التنقل بين التبويبات
        function switchTab(tabId) {
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.card:not(#screenLogin):not(#screenMain)').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1)).classList.remove('hidden');
            document.querySelector(`.tabs button[onclick*="${tabId}"]`).classList.add('active');
        }

        // 3. التعدين
        async function mine() {
            const btn = document.querySelector('[onclick="mine()"]');
            btn.disabled = true;
            document.getElementById('mineMsg').innerText = 'جاري التعدين...';
            const res = await fetch('/mine', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('mineMsg').innerText = data.minedPoints > 0 ? `✅ تمت إضافة ${data.minedPoints} نقطة!` : '⏳ لم يمر وقت كافٍ للتعدين بعد.';
                document.getElementById('displayPoints').innerText = data.totalPoints;
                document.getElementById('displayPlan').innerText = data.plan === 'free' ? 'مجاني' : data.plan;
            } else {
                document.getElementById('mineMsg').innerText = '❌ خطأ: ' + data.error;
            }
            btn.disabled = false;
        }

        // 4. خطط التعدين
        function loadPlans() {
            const container = document.getElementById('plansContainer');
            container.innerHTML = `
                <div class="item-box" onclick="buyPlan('starter')">
                    <strong>مبتدئ</strong><br><small>5 نقاط/دقيقة</small><br><span style="color:#f5c518;">50 نقطة</span>
                </div>
                <div class="item-box" onclick="buyPlan('pro')">
                    <strong>محترف</strong><br><small>15 نقطة/دقيقة</small><br><span style="color:#f5c518;">200 نقطة</span>
                </div>
            `;
        }
        async function buyPlan(planKey) {
            if(!confirm('هل أنت متأكد من شراء هذه الخطة؟')) return;
            const res = await fetch('/buy-plan', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, planKey })
            });
            const data = await res.json();
            alert(data.success ? data.message : '❌ فشل: ' + data.error);
            if(data.success) {
                document.getElementById('displayPoints').innerText = data.user.points;
                document.getElementById('displayPlan').innerText = data.user.miningPlan === 'free' ? 'مجاني' : data.user.miningPlan;
            }
        }

        // 5. المتجر (بيع النقاط)
        async function buyPoints(packageId) {
            if(!confirm(`هل تريد شراء هذه الباقة؟ (سيتم تفعيل نظام الدفع لاحقا)`)) return;
            const res = await fetch('/buy-points', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, packageId })
            });
            const data = await res.json();
            document.getElementById('storeMsg').innerText = data.success ? '✅ ' + data.message : '❌ ' + data.error;
            if(data.success) document.getElementById('displayPoints').innerText = data.totalPoints;
        }

        // 6. الكازينو
        let currentBet = 10;
        function setBet(amount) {
            currentBet = amount;
            document.getElementById('currentBet').innerText = amount;
        }
        setBet(10);

        async function spinCasino() {
            const btn = document.querySelector('[onclick="spinCasino()"]');
            btn.disabled = true;
            document.getElementById('casinoMsg').innerText = 'جاري الدوران...';
            document.querySelectorAll('.slot-icon').forEach(el => el.style.borderColor = '#ff0');

            const res = await fetch('/casino-spin', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, bet: currentBet })
            });
            const data = await res.json();

            document.querySelectorAll('.slot-icon').forEach(el => el.style.borderColor = '#f5a623');
            if(data.success) {
                document.getElementById('slot1').innerText = data.symbols[0];
                document.getElementById('slot2').innerText = data.symbols[1];
                document.getElementById('slot3').innerText = data.symbols[2];
                document.getElementById('displayPoints').innerText = data.totalPoints;
                document.getElementById('casinoMsg').innerText = data.winAmount > 0 ? `🎉 لقد ربحت ${data.winAmount} نقطة!` : '😔 لم تربح هذه المرة، حاول مجدداً!';
            } else {
                document.getElementById('casinoMsg').innerText = '❌ ' + data.error;
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
