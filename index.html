<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #e9e9f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: #1a1a24;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,215,0,0.1);
        }
        .box h2 { color: #ffd700; text-align: center; margin-bottom: 5px; }
        .box p { color: #636e72; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 13px; color: #b2bec3; margin-bottom: 4px; }
        .input-field {
            width: 100%;
            padding: 10px;
            background: #0d0d14;
            border: 1px solid #2d2d3a;
            border-radius: 10px;
            color: #e9e9f3;
            font-size: 14px;
            outline: none;
        }
        .input-field:focus { border-color: #ffd700; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 6px;
        }
        .btn-gold { background: #b8860b; color: #fff; }
        .btn-gold:hover { background: #daa520; }
        .btn-outline { background: transparent; border: 2px solid #b8860b; color: #ffd700; margin-top: 8px; }
        .btn-outline:hover { background: rgba(184,134,11,0.1); }
        .link { color: #ffd700; cursor: pointer; font-size: 13px; }
        .link:hover { text-decoration: underline; }
        .hidden { display: none !important; }
        .message { padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; display: none; }
        .message.success { background: rgba(0,184,148,0.15); color: #00b894; display: block; }
        .message.error { background: rgba(214,48,49,0.15); color: #ff6b6b; display: block; }
        .flex { display: flex; justify-content: space-between; margin-top: 12px; }
    </style>
</head>
<body>

<div class="box" id="appBox">
    <h2>🏆 Nexora Elite</h2>
    <p>منصة التعدين والكازينو</p>
    <div id="msg" class="message"></div>

    <!-- نموذج تسجيل الدخول -->
    <div id="loginForm">
        <div class="input-group">
            <label>البريد الإلكتروني أو اسم المستخدم</label>
            <input type="text" id="loginEmail" class="input-field" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" class="input-field" placeholder="••••••••">
        </div>
        <button class="btn btn-gold" id="loginBtn">تسجيل الدخول</button>
        <div class="flex">
            <span class="link" id="showRegister">إنشاء حساب</span>
            <span class="link" id="showForgot">نسيت كلمة السر؟</span>
        </div>
    </div>

    <!-- نموذج التسجيل -->
    <div id="registerForm" class="hidden">
        <div class="input-group">
            <label>الاسم الكامل</label>
            <input type="text" id="regName" class="input-field" placeholder="محمد أحمد">
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="regEmail" class="input-field" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="regPassword" class="input-field" placeholder="••••••••">
        </div>
        <button class="btn btn-gold" id="registerBtn">إنشاء حساب</button>
        <button class="btn btn-outline" id="backToLogin">← العودة</button>
    </div>

    <!-- نموذج استعادة -->
    <div id="forgotForm" class="hidden">
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="forgotEmail" class="input-field" placeholder="example@mail.com">
        </div>
        <button class="btn btn-gold" id="forgotBtn">إرسال رمز الاستعادة</button>
        <button class="btn btn-outline" id="backToLogin2">← العودة</button>
    </div>
</div>

<script>
// ==========================================
// الكود مباشرة داخل الصفحة (يعمل فوراً)
// ==========================================

// دوال التنقل بين النماذج
document.getElementById('showRegister').onclick = function() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.remove('hidden');
    document.getElementById('forgotForm').classList.add('hidden');
};

document.getElementById('showForgot').onclick = function() {
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('forgotForm').classList.remove('hidden');
};

document.getElementById('backToLogin').onclick = function() {
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('forgotForm').classList.add('hidden');
};

document.getElementById('backToLogin2').onclick = function() {
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('registerForm').classList.add('hidden');
    document.getElementById('forgotForm').classList.add('hidden');
};

// ===== زر تسجيل الدخول =====
document.getElementById('loginBtn').onclick = function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        alert('❌ يرجى إدخال البريد الإلكتروني وكلمة المرور');
        return;
    }

    // محاكاة تسجيل الدخول
    alert('✅ تم تسجيل الدخول بنجاح (محاكاة)\nالبريد: ' + email);
};

// ===== زر إنشاء حساب =====
document.getElementById('registerBtn').onclick = function() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!name || !email || !password) {
        alert('❌ يرجى ملء جميع الحقول');
        return;
    }
    if (password.length < 6) {
        alert('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل');
        return;
    }

    alert('✅ تم إنشاء الحساب بنجاح (محاكاة)\nالاسم: ' + name + '\nالبريد: ' + email);
};

// ===== زر استعادة كلمة المرور =====
document.getElementById('forgotBtn').onclick = function() {
    const email = document.getElementById('forgotEmail').value.trim();

    if (!email) {
        alert('❌ يرجى إدخال البريد الإلكتروني');
        return;
    }

    alert('✅ تم إرسال رمز الاستعادة إلى: ' + email);
};

console.log('✅ Nexora Elite - جاهز للعمل');
</script>

</body>
</html>
