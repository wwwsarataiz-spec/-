<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nexora Elite | المحفظة</title>
    <style>
        body { background: #0b0c10; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #1f2833; padding: 20px; border-radius: 20px; max-width: 400px; margin: 10px auto; }
        .wallet-box { background: #000; padding: 10px; border-radius: 10px; font-size: 0.8em; word-break: break-all; margin: 10px 0; }
        button { background: #c5a059; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>إيداع Nexora Elite 💎</h1>
        <select id="coinSelect" class="input-field">
            <option value="USDT">USDT</option>
            <option value="SOL">SOL</option>
            <option value="BNB">BNB</option>
        </select>
        <div class="wallet-box" id="walletAddr">0x2975dc1f8188c30b2a4be0ec27e33494da66cb46</div>
        <button onclick="notifyDeposit()">تم التحويل (إبلاغ الإدارة)</button>
    </div>

    <script>
        function notifyDeposit() {
            const coin = document.getElementById('coinSelect').value;
            fetch('/api/deposit-notify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId: "7018561132", coin, amount: "Pending" })
            });
            alert("تم إخطار الإدارة، سيتم مراجعة إيداعك.");
        }
    </script>
</body>
</html>
