<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Elite</title>
    <style>
        body { background: #f4f6f8; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .header { background: #0b3d2e; color: white; padding: 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; text-align: center; }
        .balance-card { background: white; margin: -30px 20px 20px 20px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .btn-action { background: #c5a059; color: white; padding: 15px; border-radius: 10px; text-decoration: none; display: block; text-align: center; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .nav a { color: #555; text-decoration: none; font-size: 0.8em; cursor: pointer; }
        /* تنسيق الإعلانات */
        .ad-box { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-right: 5px solid #c5a059; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Nexora Elite</h1>
    </div>

    <div class="balance-card">
        <p>الرصيد الإجمالي (USDT)</p>
        <h2 id="balance">0.25</h2>
        <div class="grid">
            <a href="#" class="btn-action" onclick="showModal('deposit')">تعبئة رصيد</a>
            <a href="#" class="btn-action" onclick="showModal('withdraw')">سحب</a>
        </div>
    </div>

    <div id="content" style="padding: 20px;">
        <h3>قاعة المهام (VIP)</h3>
        <div class="card">استثمر في مستوى VIP1 لتبدأ التعدين...</div>
    </div>

    <div class="nav">
        <a onclick="loadTab('home')">🏠 البيت</a>
        <a onclick="loadTab('tasks')">📋 مهام</a>
        <a onclick="loadTab('ads')">📺 إعلانات</a>
        <a onclick="loadTab('team')">👥 فريق</a>
        <a onclick="loadTab('profile')">👤 أنا</a>
    </div>

    <script>
        // دالة تبديل الصفحات (تم دمج الإعلانات بها)
        async function loadTab(tab) {
            const content = document.getElementById('content');
            if(tab === 'ads') {
                content.innerHTML = '<h3>الإعلانات المتاحة</h3><div id="ads-list">جاري التحميل...</div>';
                const res = await fetch('/api/get-ads', { method: 'POST' });
                const ads = await res.json();
                document.getElementById('ads-list').innerHTML = ads.map(ad => `
                    <div class="ad-box">
                        <p>${ad.title}</p>
                        <button onclick="watchAd('${ad._id}', '${ad.link}')">شاهد واربح ${ad.costPerView} USDT</button>
                    </div>
                `).join('');
            } else if(tab === 'team') {
                content.innerHTML = `<h3>فريق Nexora</h3><p>رابط الإحالة: https://nexora.com/ref/12345</p>`;
            } else {
                content.innerHTML = `<h3>قاعة المهام</h3><p>المحتوى الأساسي هنا...</p>`;
            }
        }

        // منطق المشاهدة مع المؤقت
        async function watchAd(adId, link) {
            window.open(link, '_blank');
            alert("يرجى البقاء في الإعلان لمدة 15 ثانية!");
            setTimeout(async () => {
                const res = await fetch('/api/watch-ad', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ telegramId: "7018561132", adId })
                });
                const data = await res.json();
                alert(data.message);
            }, 15000);
        }
    </script>
</body>
</html>
