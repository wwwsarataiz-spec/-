<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Elite • تسجيل الدخول</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0d12;
            color: #e9e9f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #161a22;
            padding: 30px;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #ffd70033;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo i {
            font-size: 40px;
            color: #ffd700;
        }
        .logo h1 {
            color: #ffd700;
            font-size: 24px;
            margin-top: 8px;
        }
        .logo p {
            color: #aaa;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #ccc;
            margin-bottom: 4px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #2a2f3a;
            background: #0f131a;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #ffd700;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            background: #ffd700;
            color: #000;
            transition: 0.2s;
        }
        .btn:hover {
            background: #e6c200;
        }
        .btn-secondary {
            background: transparent;
            color: #ffd700;
            border: 1px solid #ffd700;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: #ffd70022;
        }
        .link-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-top: 16px;
        }
        .link-row span {
            color: #ffd700;
            cursor: pointer;
        }
        .link-row span:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none !important;
        }
        .message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        .message.error {
            background: #ff444422;
            color: #ff6666;
            border: 1px solid #ff4444;
        }
        .message.success {
            background: #00cc6644;
            color: #66ff99;
            border: 1px solid #00cc66;
        }
        .admin-btn {
            margin-top: 20px;
            text-align: center;
        }
        .admin-btn button {
            background: none;
            border: none;
            color: #555;
            font-size: 12px;
            cursor: pointer;
        }
        .admin-btn button:hover {
            color: #ffd700;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="logo">
        <i class="fas fa-cubes"></i>
        <h1>Nexora Elite</h1>
        <p>منصة التعدين والكازينو</p>
    </div>

    <!-- نموذج تسجيل الدخول -->
    <div id="loginForm">
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="loginEmail" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn" id="loginBtn">تسجيل الدخول</button>
        <div class="link-row">
            <span id="showRegister">إنشاء حساب جديد</span>
            <span id="showForgot">نسيت كلمة السر؟</span>
        </div>
    </div>

    <!-- نموذج التسجيل -->
    <div id="registerForm" class="hidden">
        <div class="input-group">
            <label>الاسم الكامل</label>
            <input type="text" id="regName" placeholder="أحمد محمد">
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="regEmail" placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label>رقم الهاتف (اختياري)</label>
            <div style="display:flex; gap:8px;">
                <select id="regCountryCode" style="width:100px; padding:12px; border-radius:12px; border:1px solid #2a2f3a; background:#0f131a; color:#fff;">
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+967">🇾🇪 +967</option>
                    <option value="+971">🇦🇪 +971</option>
                    <option value="+20">🇪🇬 +20</option>
                    <option value="+212">🇲🇦 +212</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+44">🇬🇧 +44</option>
                </select>
                <input type="text" id="regPhone" placeholder="512345678" style="flex:1; padding:12px; border-radius:12px; border:1px solid #2a2f3a; background:#0f131a; color:#fff;">
            </div>
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="regPassword" placeholder="••••••••">
        </div>
        <button class="btn" id="registerBtn">إنشاء حساب</button>
        <button class="btn btn-secondary" id="backToLogin">← العودة لتسجيل الدخول</button>
    </div>

    <!-- نموذج استعادة كلمة المرور -->
    <div id="forgotForm" class="hidden">
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="forgotEmail" placeholder="example@mail.com">
        </div>
        <button class="btn" id="forgotBtn">إرسال رمز الاستعادة</button>
        <button class="btn btn-secondary" id="backToLogin2">← العودة لتسجيل الدخول</button>
    </div>

    <!-- نموذج تأكيد البريد الإلكتروني -->
    <div id="verifyForm" class="hidden">
        <div class="input-group">
            <label>رمز التأكيد المرسل إلى بريدك</label>
            <input type="text" id="verifyCode" placeholder="أدخل الرمز 6 أرقام">
        </div>
        <button class="btn" id="verifyBtn">تفعيل الحساب</button>
        <button class="btn btn-secondary" id="backToLogin3">← العودة لتسجيل الدخول</button>
    </div>

    <!-- رسائل الخطأ/النجاح -->
    <div id="messageBox" class="hidden message"></div>

    <!-- زر الإدارة -->
    <div class="admin-btn">
        <button id="adminOpenBtn">⚙️ إدارة</button>
    </div>
</div>

<script>
// ==========================================
// الأساسيات
// ==========================================
const API_BASE = window.location.origin || 'https://nexora-backend-ko1u.onrender.com';

// عناصر النماذج
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');
const forgotForm = document.getElementById('forgotForm');
const verifyForm = document.getElementById('verifyForm');
const msgBox = document.getElementById('messageBox');

// أزرار التنقل
document.getElementById('showRegister').addEventListener('click', () => showForm('register'));
document.getElementById('showForgot').addEventListener('click', () => showForm('forgot'));
document.getElementById('backToLogin').addEventListener('click', () => showForm('login'));
document.getElementById('backToLogin2').addEventListener('click', () => showForm('login'));
document.getElementById('backToLogin3').addEventListener('click', () => showForm('login'));

// ==========================================
// دوال عرض النماذج
// ==========================================
function showForm(form) {
    loginForm.classList.add('hidden');
    registerForm.classList.add('hidden');
    forgotForm.classList.add('hidden');
    verifyForm.classList.add('hidden');
    hideMessage();

    if (form === 'login') loginForm.classList.remove('hidden');
    else if (form === 'register') registerForm.classList.remove('hidden');
    else if (form === 'forgot') forgotForm.classList.remove('hidden');
    else if (form === 'verify') verifyForm.classList.remove('hidden');
}

function showMessage(text, type = 'error') {
    msgBox.textContent = text;
    msgBox.className = 'message ' + type;
    msgBox.classList.remove('hidden');
}

function hideMessage() {
    msgBox.classList.add('hidden');
}

// ==========================================
// 1. التسجيل (Register)
// ==========================================
document.getElementById('registerBtn').addEventListener('click', async () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const countryCode = document.getElementById('regCountryCode').value;
    const password = document.getElementById('regPassword').value;

    if (!name || !email || !password) {
        showMessage('❌ يرجى ملء الاسم والبريد الإلكتروني وكلمة المرور', 'error');
        return;
    }
    if (password.length < 6) {
        showMessage('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
        return;
    }

    const fullPhone = phone ? countryCode + phone : 'غير محدد';

    try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, phone: fullPhone })
        });
        const data = await res.json();

        if (data.success) {
            showMessage('✅ تم إنشاء الحساب! يرجى التحقق من بريدك الإلكتروني', 'success');
            // ننتقل إلى نموذج التحقق
            showForm('verify');
            // نستخدم الـ email لتأكيد التحقق
            window._verifyEmail = email;
        } else {
            showMessage(data.message || '❌ فشل التسجيل', 'error');
        }
    } catch (error) {
        showMessage('❌ حدث خطأ في الاتصال بالخادم', 'error');
        console.error(error);
    }
});

// ==========================================
// 2. تأكيد البريد الإلكتروني
// ==========================================
document.getElementById('verifyBtn').addEventListener('click', async () => {
    const code = document.getElementById('verifyCode').value.trim();
    const email = window._verifyEmail || '';

    if (!code || code.length !== 6) {
        showMessage('❌ يرجى إدخال الرمز المكون من 6 أرقام', 'error');
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/auth/verify-email`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code })
        });
        const data = await res.json();

        if (data.success) {
            showMessage('✅ تم تأكيد البريد بنجاح! يمكنك الآن تسجيل الدخول', 'success');
            setTimeout(() => showForm('login'), 1500);
        } else {
            showMessage(data.message || '❌ رمز غير صحيح', 'error');
        }
    } catch (error) {
        showMessage('❌ خطأ في الاتصال', 'error');
        console.error(error);
    }
});

// ==========================================
// 3. تسجيل الدخول (Login)
// ==========================================
document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        showMessage('❌ يرجى إدخال البريد الإلكتروني وكلمة المرور', 'error');
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            showMessage('✅ تم تسجيل الدخول بنجاح!', 'success');
            // حفظ التوكن والمستخدم
            localStorage.setItem('nexora_token', data.token);
            localStorage.setItem('nexora_user', JSON.stringify(data.user));
            // إعادة توجيه إلى الصفحة الرئيسية
            window.location.href = '/';
        } else {
            showMessage(data.message || '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة', 'error');
        }
    } catch (error) {
        showMessage('❌ خطأ في الاتصال بالخادم', 'error');
        console.error(error);
    }
});

// ==========================================
// 4. استعادة كلمة المرور
// ==========================================
document.getElementById('forgotBtn').addEventListener('click', async () => {
    const email = document.getElementById('forgotEmail').value.trim();

    if (!email) {
        showMessage('❌ يرجى إدخال البريد الإلكتروني', 'error');
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.success) {
            showMessage('✅ تم إرسال رمز الاستعادة إلى بريدك الإلكتروني', 'success');
            // ننتقل إلى نموذج التحقق مع تغيير النص
            document.querySelector('#verifyForm .input-group label').textContent = 'أدخل رمز الاستعادة المرسل إلى بريدك';
            document.getElementById('verifyBtn').textContent = 'تأكيد وإعادة تعيين كلمة المرور';
            // حفظ البريد لتغيير كلمة المرور
            window._resetEmail = email;
            showForm('verify');
        } else {
            showMessage(data.message || '❌ فشل إرسال الرمز', 'error');
        }
    } catch (error) {
        showMessage('❌ خطأ في الاتصال', 'error');
        console.error(error);
    }
});

// ==========================================
// 5. فتح الإدارة (Admin)
// ==========================================
document.getElementById('adminOpenBtn').addEventListener('click', () => {
    const pass = prompt('أدخل كلمة مرور الإدارة:');
    if (pass === 'admin123') {
        window.location.href = '/admin';
    } else if (pass !== null) {
        alert('❌ كلمة المرور غير صحيحة');
    }
});

// ==========================================
// التحقق من وجود جلسة نشطة
// ==========================================
window.onload = function() {
    const token = localStorage.getItem('nexora_token');
    if (token) {
        // إذا كان هناك توكن، حاول الانتقال للصفحة الرئيسية
        window.location.href = '/';
    }
};
</script>

</body>
</html>
