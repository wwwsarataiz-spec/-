<script>
    const TELEGRAM_ID =
        window.Telegram?.WebApp?.initDataUnsafe?.user?.id?.toString()
        || "7018561132";

    async function fetchUserData() {
        try {
            const res = await fetch('/api/user-data', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    telegramId: TELEGRAM_ID
                })
            });

            const user = await res.json();

            if (user && user.points !== undefined) {
                document.getElementById('balance').innerText =
                    Number(user.points).toFixed(2);
            }
        } catch (err) {
            console.error(err);
        }
    }

    async function watchAd(adId, link) {

        window.open(link, '_blank');

        setTimeout(async () => {

            try {

                const res = await fetch('/api/watch-ad', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        telegramId: TELEGRAM_ID,
                        adId
                    })
                });

                const result = await res.json();

                alert(result.message);

                if (result.success) {
                    fetchUserData();
                }

            } catch (err) {
                console.error(err);
                alert('حدث خطأ أثناء تسجيل المشاهدة');
            }

        }, 3000);
    }

    async function loadTab(tab) {

        const content = document.getElementById('content');

        if (tab === 'home') {

            content.innerHTML = `
                <h3>الرئيسية</h3>
                <p>مرحباً بك في منصة Nexora Elite</p>
            `;

        }

        else if (tab === 'tasks') {

            content.innerHTML = `
                <h3>المهام</h3>
                <p>سيتم إضافة المهام قريباً.</p>
            `;

        }

        else if (tab === 'team') {

            content.innerHTML = `
                <h3>الفريق</h3>
                <p>نظام الإحالات قيد التطوير.</p>
            `;

        }

        else if (tab === 'ads') {

            try {

                const res = await fetch('/api/get-ads', {
                    method: 'POST'
                });

                const ads = await res.json();

                if (!ads.length) {
                    content.innerHTML =
                        '<h3>الإعلانات</h3><p>لا توجد إعلانات حالياً.</p>';
                    return;
                }

                content.innerHTML =
                    '<h3>الإعلانات المتاحة</h3>' +
                    ads.map(ad => `
                        <div class="ad-box">
                            <h4>${ad.title}</h4>
                            <p>المكافأة: ${ad.costPerView}</p>

                            <button
                                class="btn-action"
                                onclick="watchAd('${ad._id}','${ad.link}')">
                                مشاهدة الإعلان
                            </button>
                        </div>
                    `).join('');

            } catch (err) {

                console.error(err);

                content.innerHTML =
                    '<h3>الإعلانات</h3><p>تعذر تحميل الإعلانات.</p>';
            }
        }
    }

    function openModal(type) {

        document.getElementById('modal').style.display = 'block';

        if (type === 'deposit') {

            document.getElementById('modalTitle').innerText =
                'تعبئة الرصيد';

            document.getElementById('modalBody').innerHTML = `
                <p>
                قم بالتحويل إلى محفظتك ثم أرسل إثبات الدفع للإدارة.
                </p>
            `;

        } else {

            document.getElementById('modalTitle').innerText =
                'طلب سحب';

            document.getElementById('modalBody').innerHTML = `
                <p>
                نظام السحب سيتم ربطه بالواجهة قريباً.
                </p>
            `;
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    fetchUserData();
    loadTab('home');
</script>
