<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nexora Dashboard</title>
    <style>
        body { background: #0b0c10; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1f2833; padding: 20px; border-radius: 20px; display: inline-block; width: 90%; max-width: 400px; }
        #balance { font-size: 2.5em; color: #c5a059; }
        button { background: #c5a059; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold; }
        .upgrade-btn { background: #45a049; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nexora</h1>
        <div id="balance">0.00</div>
        <p>المستوى الحالي: <span id="level">1</span></p>
        <button onclick="startMining()">⛏️ ابدأ التعدين</button>
        <button class="upgrade-btn" onclick="upgrade()">🚀 ترقية المستوى</button>
        <p id="msg"></p>
    </div>

    <script>
        const telegramId = new URLSearchParams(window.location.search).get('id');
        
        async function updateStatus() {
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('balance').innerText = data.points;
                document.getElementById('level').innerText = data.miningLevel;
            }
        }
        setInterval(updateStatus, 1000);

        async function upgrade() {
            const res = await fetch('/api/upgrade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId })
            });
            const data = await res.json();
            document.getElementById('msg').innerText = data.message;
        }

        async function startMining() {
            await fetch('/api/mine', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegramId}) });
        }
    </script>
</body>
</html>
