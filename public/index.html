<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Elite Dashboard</title>
    <style>
        :root { --primary: #c5a059; --bg: #0b0c10; --card: #1f2833; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin: 10px auto; max-width: 400px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h1 { color: var(--primary); margin: 0; }
        .btn { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold; }
        .input-field { width: 80%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Nexora Elite 💎</h1>
        <div id="balance" style="font-size: 2.5em; font-weight: bold;">0</div>
        <p>المستوى: <span id="level">1</span></p>
    </div>

    <div class="card">
        <h3>💰 العمليات المالية</h3>
        <input type="number" id="withdrawAmount" placeholder="مبلغ السحب" class="input-field">
        <input type="text" id="wallet" placeholder="عنوان المحفظة" class="input-field">
        <button class="btn" onclick="withdraw()">طلب سحب</button>
        <hr>
        <button class="btn" style="background: #45a049;" onclick="deposit()">تأكيد إيداع</button>
    </div>

    <script>
        // جلب معرف المستخدم من تليجرام
        const telegramId = window.Telegram.WebApp.initDataUnsafe?.user?.id || "7018561132";

        async function updateUI() {
            const res = await fetch('/api/user-data', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId })
            });
            const data = await res.json();
            if(data.points !== undefined) {
                document.getElementById('balance').innerText = data.points;
                document.getElementById('level').innerText = data.miningLevel;
            }
        }

        async function withdraw() {
            const amount = document.getElementById('withdrawAmount').value;
            const wallet = document.getElementById('wallet').value;
            const res = await fetch('/api/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId, amount, wallet })
            });
            const data = await res.json();
            alert(data.message);
            updateUI();
        }

        async function deposit() {
            alert("يرجى إرسال المبلغ للمحفظة: TRC20_ADDRESS_HERE\nثم تواصل مع الإدارة عبر البوت.");
            await fetch('/api/deposit-notify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId, amount: 0 })
            });
        }

        updateUI();
    </script>
</body>
</html>
