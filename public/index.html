<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>Nexora</title></head>
<body style="background:#0b0c10; color:#fff; text-align:center; padding:50px;">
    <h1>رصيدك الحالي</h1>
    <div id="balance" style="font-size:3em; color:#c5a059;">0.00</div>
    <button onclick="startMining()">⛏️ ابدأ التعدين</button>
    <button onclick="collectPoints()">💰 حصاد</button>

    <script>
        const telegramId = new URLSearchParams(window.location.search).get('id');
        async function update() {
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId })
            });
            const data = await res.json();
            if(data.success) document.getElementById('balance').innerText = data.points;
        }
        setInterval(update, 1000); // تحديث كل ثانية

        async function startMining() {
            await fetch('/api/mine', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegramId}) });
        }
        async function collectPoints() {
            await fetch('/api/collect', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegramId}) });
        }
    </script>
</body>
</html>
