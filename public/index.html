<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Dashboard</title>
    <style>
        :root { --primary: #c5a059; --bg: #0b0c10; --card: #1f2833; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; display: inline-block; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-top: 0; color: var(--primary); }
        #balance { font-size: 3em; font-weight: bold; margin: 20px 0; color: #fff; text-shadow: 0 0 10px var(--primary); }
        .stats { font-size: 1.1em; margin-bottom: 20px; }
        button { background: var(--primary); border: none; padding: 15px 25px; border-radius: 15px; color: #000; font-weight: bold; cursor: pointer; margin: 10px; width: 100%; transition: 0.3s; }
        button:hover { transform: scale(1.05); opacity: 0.9; }
        .upgrade-btn { background: #45a049; color: white; }
        #msg { margin-top: 15px; font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nexora</h1>
        <div id="balance">0.00</div>
        <div class="stats">المستوى الحالي: <span id="level">1</span></div>
        <button onclick="startMining()">⛏️ ابدأ التعدين</button>
        <button class="upgrade-btn" onclick="upgrade()">🚀 ترقية المستوى</button>
        <div id="msg"></div>
    </div>

    <script>
        const telegramId = new URLSearchParams(window.location.search).get('id');
        
        async function updateStatus() {
            const res = await fetch('/api/status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId })
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('balance').innerText = data.points;
                document.getElementById('level').innerText = data.miningLevel;
            }
        }
        setInterval(updateStatus, 1000);

        async function upgrade() {
            const res = await fetch('/api/upgrade', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ telegramId })
            });
            const data = await res.json();
            document.getElementById('msg').innerText = data.message;
        }

        function startMining() {
            document.getElementById('msg').innerText = "تم تفعيل التعدين بنجاح!";
        }
    </script>
</body>
</html>
