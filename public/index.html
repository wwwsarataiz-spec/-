<div id="terms-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; display:flex; align-items:center; justify-content:center;">
    <div class="card">
        <h2>الشروط والأحكام</h2>
        <p style="text-align:right; font-size: 0.8em;">1. يمنع استخدام حسابات متعددة.<br>2. الإيداع والسحب يتم بمسؤولية المستخدم.<br>3. الإدارة تحتفظ بحق إيقاف الحساب المخالف.</p>
        <button onclick="agreeTerms()">أوافق على الشروط</button>
    </div>
</div>

<script>
    function agreeTerms() {
        document.getElementById('terms-overlay').style.display = 'none';
        localStorage.setItem('acceptedTerms', 'true');
    }

    // التحقق عند فتح الصفحة
    window.onload = () => {
        if(localStorage.getItem('acceptedTerms')) {
            document.getElementById('terms-overlay').style.display = 'none';
        }
    };
</script>
