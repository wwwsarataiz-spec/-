<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Elite v2</title>
    <!-- استدعاء ملف التصميم والخطوط -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <!-- استدعاء مكتبة تلجرام الرسمية للتطبيقات المصغرة -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- القائمة العلوية الفخمة -->
    <div class="header">
        <div class="user-info">
            <span id="username">جاري التحميل...</span>
        </div>
        <div class="badge">ELITE 👑</div>
    </div>

    <!-- لوحة عرض الرصيد والتعدين -->
    <div class="balance-card">
        <p class="balance-title">إجمالي الرصيد المستثمر</p>
        <h1 class="balance-amount"><span id="balance">0.0000</span> <span class="currency">NEX</span></h1>
        
        <!-- شريط الطاقة -->
        <div class="energy-section">
            <span>الطاقة: <span id="energy">100</span>/100</span>
            <div class="energy-bar"><div class="energy-fill" id="energyFill"></div></div>
        </div>
    </div>

    <!-- أزرار التحكم الرئيسية بقسم التعدين والاستثمار -->
    <div class="main-actions">
        <button class="btn btn-gold" id="claimBtn">⚡ حصد أرباح التعدين ⚡</button>
    </div>

    <!-- الألعاب المتاحة (الكازينو العادل) -->
    <div class="section-title">الألعاب السريعة (Provably Fair)</div>
    <div class="games-grid">
        <div class="game-card" onclick="playGame('Crash')">
            <div class="game-icon">📈</div>
            <h3>لعبة Crash</h3>
            <p>نسبة ربح 95%</p>
        </div>
        <div class="game-card" onclick="playGame('Dice')">
            <div class="game-icon">🎲</div>
            <h3>لعبة النرد</h3>
            <p>خوارزمية عادلة</p>
        </div>
    </div>

    <!-- شريط التنقل السفلي الفخم -->
    <div class="navbar">
        <div class="nav-item active">🏠 الرئيسية</div>
        <div class="nav-item">📈 الاستثمار</div>
        <div class="nav-item">👥 الإحالات</div>
        <div class="nav-item">⚙️ الإدارة</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
