<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Elite | Official</title>
    <style>
        :root { --gold: #c5a059; --bg: #0b0e14; --card: #161b22; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        
        .header { background: #0f172a; padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        
        .balance-section { background: var(--card); margin: 20px; padding: 30px; border-radius: 20px; border: 1px solid #30363d; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .balance-label { color: #8b949e; font-size: 0.9em; margin-bottom: 10px; }
        .balance-amount { color: var(--gold); font-size: 2.8em; font-weight: 800; }
        
        .action-row { display: flex; gap: 10px; margin-top: 25px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--gold); }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 1.2em; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header"><h2>Nexora Elite</h2></div>

    <div class="balance-section">
        <div class="balance-label">الرصيد الإجمالي (USDT)</div>
        <div class="balance-amount" id="balance">0.00</div>
        <div class="action-row">
            <button class="btn btn-gold" onclick="alert('تفعيل نافذة الإيداع')">إيداع</button>
            <button class="btn btn-outline" onclick="alert('تفعيل نافذة السحب')">سحب</button>
        </div>
    </div>

    <div id="app-content" style="padding: 20px; text-align: center;">
        <p style="color: #64748b;">مرحباً بك في لوحة تحكم Nexora Elite</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="loadTab('البيت')">🏠</div>
        <div class="nav-item" onclick="loadTab('مهام')">📋</div>
        <div class="nav-item" onclick="loadTab('إعلانات')">📺</div>
        <div class="nav-item" onclick="loadTab('فريق')">👥</div>
    </div>

    <script>
        async function fetchUser() {
            try {
                const res = await fetch('/api/user-data', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ telegramId: "7018561132" }) 
                });
                const data = await res.json();
                document.getElementById('balance').innerText = (data.points || 0).toFixed(2);
            } catch(e) { console.error(e); }
        }
        
        function loadTab(name) {
            document.getElementById('app-content').innerHTML = `<h3>${name}</h3>`;
        }
        
        fetchUser();
    </script>
</body>
</html>
